apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
  namespace: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: production-app
  template:
    metadata:
      labels:
        app: production-app
    spec:
      containers:
      - name: production-container
        image: europe-west4-docker.pkg.dev/qwiklabs-gcp-02-2243e9fd18c1/my-repository/hello-cloudbuild:v1.0
        ports:
        - containerPort: 8080